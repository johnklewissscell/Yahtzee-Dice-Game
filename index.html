<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahtzee Dice Game | Gameplay</title>
    <link rel="icon" href="dice-logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="banner">
        <img src="dice-logo.png" alt="Dice Logo" id="logo">
        <h1 id="heading">Yahtzee Online</h1>
        <div id="stats">
            <div class="separator"></div>
            <h2>Game Number<span id="game-count"></span></h2>
            <div class="separator"></div>
            <h2>Player Name<span id="player-name"></span></h2>
            <div class="separator"></div>
            <h2>Time<span id="time-count"></span></h2>
            <div class="separator"></div>
        </div>
    </div>
    <div id="keeper-dice">
        <div class="diceOne"></div>
        <div class="diceTwo"></div>
        <div class="diceThree"></div>
        <div class="diceFour"></div>
        <div class="diceFive"></div>
    </div>
    <div id="counter">
        <h2>Rolls Left <span id="roll-count"></span></h2>
    </div>
    <div id="mid-section">
        <div id="playspace">
            <div class="diceOne"></div>
            <div class="diceTwo"></div>
            <div class="diceThree"></div>
            <div class="diceFour"></div>
            <div class="diceFive"></div>
        </div>
        <div id="unset-dice">
            <div class="diceOne"></div>
            <div class="diceTwo"></div>
            <div class="diceThree"></div>
            <div class="diceFour"></div>
            <div class="diceFive"></div>
        </div>
        <div id="roll-btn">
            <button id="roll-button">Roll Dice</button>
        </div>
    </div>
    <div id="scorecard">
        <table id="upper-table">
            <div id="upper-section">
                <tr>
                    <th>Category</th>
                    <th>Score</th>
                </tr>
                <tr>
                    <td>Aces</td>
                    <td id="aces-score"></td>
                </tr>
                <tr>
                    <td>Twos</td>
                    <td id="twos-score"></td>
                </tr>
                <tr>
                    <td>Threes</td>
                    <td id="threes-score"></td>
                </tr>
                <tr>
                    <td>Fours</td>
                    <td id="fours-score"></td>
                </tr>
                <tr>
                    <td>Fives</td>
                    <td id="fives-score"></td>
                </tr>
                <tr>
                    <td>Sixers</td>
                    <td id="sixes-score"></td>
                </tr>
                <tr class="deep">
                    <td>Score</td>
                    <td id="upper-score"></td>
                </tr>
                <tr class="deep">
                    <td>Bonus</td>
                    <td id="bonus-score"></td>
                </tr>
                <tr class="deep">
                    <td>Total Upper Score</td>
                    <td id="total-upper-score"></td>
                </tr>
            </div>
        </table>
        <table id="lower-table">
            <div id="lower-section">
                <th>Category</th>
                <th>Score</th>
                <tr>
                    <td>Three of a Kind</td>
                    <td id="three-kind-score"></td>
                </tr>
                <tr>
                    <td>Four of a Kind</td>
                    <td id="four-kind-score"></td>
                </tr>
                <tr>
                    <td>Full House</td>
                    <td id="full-house-score"></td>
                </tr>
                <tr>
                    <td>Small Straight</td>
                    <td id="small-straight-score"></td>
                </tr>
                <tr>
                    <td>Large Straight</td>
                    <td id="large-straight-score"></td>
                </tr>
                <tr>
                    <td>Yahtzee</td>
                    <td id="yahtzee-score"></td>
                </tr>
                <tr>
                    <td>Chance</td>
                    <td id="chance-score"></td>
                </tr>
                <tr>
                    <td>Yahtzee Bonus</td>
                    <td id="yahtzee-bonus-score"></td>
                </tr>
                <tr class="deep">
                    <td>Total Lower Score</td>
                    <td id="total-lower-score"></td>
                </tr>
                </tr>
            </div>
        </table>
    </div>
    <div id="final-score">
        <h2>Final Score: <span id="final-score-value"></span></h2>
    </div>
    <script src="script.js"></script>
</body>

</html>
