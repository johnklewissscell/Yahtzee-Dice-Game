<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahtzee Dice Game | Gameplay</title>
    <link rel="icon" href="./images/dice-logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="banner">
        <img src="./images/dice-logo.png" alt="Dice Logo" id="logo">
        <h1 id="heading">Yahtzee Online</h1>
        <div id="stats">
            <div class="separator"></div>
            <h2>Game Number<span id="game-count"></span></h2>
            <div class="separator"></div>
            <h2>Player Name<span id="player-name"></span></h2>
            <div class="separator"></div>
            <h2>Time<span id="time-count"></span></h2>
            <div class="separator"></div>
        </div>
    </div>
    <div id="keeper-dice">
        <div class="diceOne keepDice dice"></div>
        <div class="diceTwo keepDice dice"></div>
        <div class="diceThree keepDice dice"></div>
        <div class="diceFour keepDice dice"></div>
        <div class="diceFive keepDice dice"></div>
    </div>
    <div id="counter">
        <h2>Rolls Left</h2>
        <span id="roll-count">3</span>
    </div>
    <div id="mid-section">
        <div id="playspace">
            <div id="playOne" class="diceOne playdice dice"></div>
            <div id="playTwo" class="diceTwo playdice dice"></div>
            <div id="playThree" class="diceThree playdice dice"></div>
            <div id="playFour" class="diceFour playdice dice"></div>
            <div id="playFive" class="diceFive playdice dice"></div>
        </div>
        <div id="unset-dice">
            <div class="diceOne dice"><img alt="1" src="./images/dice-six-faces-one.png"></div>
            <div class="diceTwo dice"><img alt="2" src="./images/dice-six-faces-two.png"></div>
            <div class="diceThree dice"><img alt="3" src="./images/dice-six-faces-three.png"></div>
            <div class="diceFour dice"><img alt="4" src="./images/dice-six-faces-four.png"></div>
            <div class="diceFive dice"><img alt="5" src="./images/dice-six-faces-five.png"></div>
        </div>
        <div id="roll-btn">
            <button id="roll-button">Roll Dice</button>
        </div>
    </div>
    <div id="scorecard">
        <table id="upper-table">
            <div id="upper-section">
                <tr>
                    <th>Category</th>
                    <th>Score</th>
                </tr>
                <tr>
                    <td>Aces</td>
                    <td id="aces-score"></td>
                </tr>
                <tr>
                    <td>Twos</td>
                    <td id="twos-score"></td>
                </tr>
                <tr>
                    <td>Threes</td>
                    <td id="threes-score"></td>
                </tr>
                <tr>
                    <td>Fours</td>
                    <td id="fours-score"></td>
                </tr>
                <tr>
                    <td>Fives</td>
                    <td id="fives-score"></td>
                </tr>
                <tr>
                    <td>Sixers</td>
                    <td id="sixes-score"></td>
                </tr>
                <tr class="deep">
                    <td>Score</td>
                    <td id="upper-score"></td>
                </tr>
                <tr class="deep">
                    <td>Bonus</td>
                    <td id="bonus-score"></td>
                </tr>
                <tr class="deep">
                    <td>Total Upper Score</td>
                    <td id="total-upper-score"></td>
                </tr>
            </div>
        </table>
        <table id="lower-table">
            <div id="lower-section">
                <th>Category</th>
                <th>Score</th>
                <tr>
                    <td>Three of a Kind</td>
                    <td id="three-kind-score"></td>
                </tr>
                <tr>
                    <td>Four of a Kind</td>
                    <td id="four-kind-score"></td>
                </tr>
                <tr>
                    <td>Full House</td>
                    <td id="full-house-score"></td>
                </tr>
                <tr>
                    <td>Small Straight</td>
                    <td id="small-straight-score"></td>
                </tr>
                <tr>
                    <td>Large Straight</td>
                    <td id="large-straight-score"></td>
                </tr>
                <tr>
                    <td>Yahtzee</td>
                    <td id="yahtzee-score"></td>
                </tr>
                <tr>
                    <td>Chance</td>
                    <td id="chance-score"></td>
                </tr>
                <tr>
                    <td>Yahtzee Bonus</td>
                    <td id="yahtzee-bonus-score"></td>
                </tr>
                <tr class="deep">
                    <td>Total Lower Score</td>
                    <td id="total-lower-score"></td>
                </tr>
                </tr>
            </div>
        </table>
    </div>
    <div id="final-score">
        <h2>Final Score: <span id="final-score-value"></span></h2>
    </div>
    <script src="script.js"></script>
</body>

</html>
