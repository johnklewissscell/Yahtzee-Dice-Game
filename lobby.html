<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahtzee Dice Game | Lobby</title>
    <link rel="stylesheet" href="lobby.css">
</head>
<body>
    <header>
        <div id="game-title">
        <img src="./images/dice-logo.png" alt="Dice Logo" id="logo">
        <h2 id="heading">Yahtzee Online</h2>
        </div>
        <div id="player-name">Player Name</div>
        <div id="games-played">Games Played: <span id="game-count">0</span></div>
    </header>
    <main>
        <div id="middle">
            <div id="left">
                <div id="enter-name"></div>
                <div id="multiplayer"></div>
                <div id="game-code"></div>
            </div>
            <div id="right">
                <h2>Waiting Room</h2>
            </div>
        </div>
        <div id="start-game"></div>
    </main>
    <script src="lobby.js"></script>
</body>
</html>
