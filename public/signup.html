<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahtzee Dice Game | Sign Up</title>
    <link rel="icon" href="images/dice-logo.png" />
    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <div class="signup-container">
      <h1>SIGN UP</h1>

      <div class="input-group">
        <label for="username">USERNAME</label>
        <input type="text" id="username" placeholder="JohnLwis23"/>
      </div>

      <div class="input-group">
        <label for="email">EMAIL</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>

      <div class="input-group">
        <label for="password">PASSWORD</label>
        <input type="text" id="password" placeholder="password" />
      </div>

      <button type="submit">SIGN UP</button>

      <div class="divider">OR</div>

      <div class="social-signup">
        <button type="button" class="google-btn">Sign up with Google</button>
      </div>

      <div class="footer">
        Already have an account? <a href="index.html">Log in</a>
      </div>
    </div>

    <script type="module" src="signup.js"></script>
  </body>
</html>
